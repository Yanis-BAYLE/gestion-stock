<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Produits - Gestion de stock</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
    <h1>Gestion de stock</h1>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="products.html">Produits</a>
    </nav>
</header>

<main class="container">
    <p id="message" class="message" aria-live="polite"></p>

    <section class="card">
        <h2>Liste des produits</h2>

        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>Référence</th>
                    <th>Nom</th>
                    <th>Catégorie</th>
                    <th>Fournisseur</th>
                    <th>Quantité</th>
                    <th>Seuil minimum</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="products-table-body">
                </tbody>
            </table>
        </div>
    </section>

    <section class="card">
        <h2 id="product-form-title">Ajouter un produit</h2>

        <form id="product-form">
            <input type="hidden" id="product-id">

            <div class="form-group">
                <label for="reference">Référence</label>
                <input type="text" id="reference" required>
            </div>

            <div class="form-group">
                <label for="name">Nom</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description"></textarea>
            </div>

            <div class="form-group">
                <label for="quantity">Quantité</label>
                <input type="number" id="quantity" min="0" required>
            </div>

            <div class="form-group">
                <label for="minimumQuantity">Seuil minimum</label>
                <input type="number" id="minimumQuantity" min="0" required>
            </div>

            <div class="form-group">
                <label for="categoryId">Catégorie</label>
                <select id="categoryId">
                    <option value="">Aucune catégorie</option>
                </select>
            </div>

            <div class="form-group">
                <label for="supplierId">Fournisseur</label>
                <select id="supplierId">
                    <option value="">Aucun fournisseur</option>
                </select>
            </div>

            <div class="actions">
                <button type="submit">Enregistrer</button>
                <button type="button" id="cancel-edit-button" class="secondary">Annuler</button>
            </div>
        </form>
    </section>

    <section class="card">
        <h2>Mouvement de stock</h2>

        <form id="movement-form">
            <div class="form-group">
                <label for="movementProductId">Produit</label>
                <select id="movementProductId" required>
                    <option value="">Sélectionner un produit</option>
                </select>
            </div>

            <div class="form-group">
                <label for="movementType">Type de mouvement</label>
                <select id="movementType" required>
                    <option value="IN">Entrée de stock</option>
                    <option value="OUT">Sortie de stock</option>
                </select>
            </div>

            <div class="form-group">
                <label for="movementQuantity">Quantité</label>
                <input type="number" id="movementQuantity" min="1" required>
            </div>

            <div class="form-group">
                <label for="reason">Motif</label>
                <input type="text" id="reason">
            </div>

            <button type="submit">Valider le mouvement</button>
        </form>
    </section>
</main>

<script src="js/app.js"></script>
</body>
</html>
